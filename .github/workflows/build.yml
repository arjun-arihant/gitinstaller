name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: GitInstaller-Windows
          - os: ubuntu-22.04
            artifact: GitInstaller-Linux
          - os: macos-latest
            artifact: GitInstaller-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── Platform-specific system deps ───

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            gir1.2-webkit2-4.1 \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            python3-gi \
            python3-gi-cairo \
            gobject-introspection \
            libcairo2-dev

      # ─── Python deps ───

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install -r requirements-build.txt

      - name: Install app dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install -r requirements.txt

      - name: Install app dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install pywebview requests python-dotenv Pillow pystray
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit

      - name: Install app dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install pywebview requests python-dotenv Pillow pystray
          # PyGObject >= 3.52 requires girepository-2.0, not available in Ubuntu 22.04
          pip install PyGObject==3.48.2

      # ─── Prepare data directory ───

      - name: Ensure data directory exists
        shell: bash
        run: |
          mkdir -p data
          # design.md should be in the repo, but create fallback if missing
          if [ ! -f data/design.md ]; then
            echo "# GitInstaller WebUI Design" > data/design.md
            echo "No design spec configured." >> data/design.md
          fi

      # ─── Download Portable Runtimes ───

      - name: Download Portable Runtimes
        shell: bash
        run: |
          mkdir -p bundled/python bundled/node bundled/git || true
          
          echo "Downloading Python..."
          if [ "$RUNNER_OS" = "Windows" ]; then
            PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-pc-windows-msvc-shared-install_only.tar.gz"
          elif [ "$RUNNER_OS" = "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" = "arm64" ] || [ "$ARCH" = "aarch64" ]; then
              PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-aarch64-apple-darwin-install_only.tar.gz"
            else
              PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-apple-darwin-install_only.tar.gz"
            fi
          else
            PYTHON_URL="https://github.com/indygreg/python-build-standalone/releases/download/20240224/cpython-3.11.8+20240224-x86_64-unknown-linux-gnu-install_only.tar.gz"
          fi
          curl -L -o python.tar.gz "$PYTHON_URL"
          tar -xf python.tar.gz -C bundled/python --strip-components=1
          rm -f python.tar.gz

          echo "Downloading Node.js..."
          if [ "$RUNNER_OS" = "Windows" ]; then
            curl -L -o node.zip "https://nodejs.org/dist/v20.12.2/node-v20.12.2-win-x64.zip"
            unzip -q node.zip -d bundled/node_temp
            mv bundled/node_temp/*/* bundled/node/
            rm -rf bundled/node_temp node.zip
          elif [ "$RUNNER_OS" = "macOS" ]; then
            ARCH=$(uname -m)
            if [ "$ARCH" = "arm64" ] || [ "$ARCH" = "aarch64" ]; then
              NODE_URL="https://nodejs.org/dist/v20.12.2/node-v20.12.2-darwin-arm64.tar.gz"
            else
              NODE_URL="https://nodejs.org/dist/v20.12.2/node-v20.12.2-darwin-x64.tar.gz"
            fi
            curl -L -o node.tar.gz "$NODE_URL"
            tar -xf node.tar.gz -C bundled/node --strip-components=1
            rm -f node.tar.gz
          else
            curl -L -o node.tar.xz "https://nodejs.org/dist/v20.12.2/node-v20.12.2-linux-x64.tar.xz"
            tar -xf node.tar.xz -C bundled/node --strip-components=1
            rm -f node.tar.xz
          fi

          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "Downloading MinGit (Windows only)..."
            curl -L -o git.zip "https://github.com/git-for-windows/git/releases/download/v2.44.0.windows.1/MinGit-2.44.0-64-bit.zip"
            unzip -q git.zip -d bundled/git/
            rm -f git.zip
          fi

      # ─── Build ───
      - name: Build with PyInstaller
        shell: bash
        run: |
          SEP=":"
          ICON_FLAG=""
          EXTRA_IMPORTS=""
          VC_BINARIES=""

          if [ "$RUNNER_OS" = "Windows" ]; then
            SEP=";"
            ICON_FLAG="--icon frontend/icon.ico"
            EXTRA_IMPORTS="--hidden-import clr"
            if [ -f "C:/Windows/System32/vcruntime140.dll" ]; then
              VC_BINARIES="--add-binary C:/Windows/System32/vcruntime140.dll${SEP}."
            fi
            if [ -f "C:/Windows/System32/msvcp140.dll" ]; then
              VC_BINARIES="$VC_BINARIES --add-binary C:/Windows/System32/msvcp140.dll${SEP}."
            fi
          fi

          if [ "$RUNNER_OS" = "macOS" ]; then
            EXTRA_IMPORTS="--hidden-import objc --hidden-import AppKit --hidden-import WebKit --hidden-import Foundation"
          fi

          if [ "$RUNNER_OS" = "Linux" ]; then
            EXTRA_IMPORTS="--hidden-import gi"
          fi

          # Include bundled runtimes if present in the repo
          BUNDLED_FLAG=""
          if [ -d "bundled" ] && [ "$(ls -A bundled/)" ]; then
            BUNDLED_FLAG="--add-data bundled${SEP}bundled"
          fi

          pyinstaller \
            --name GitInstaller \
            --onedir \
            --windowed \
            $ICON_FLAG \
            --add-data "frontend${SEP}frontend" \
            --add-data "data${SEP}data" \
            --add-data "core${SEP}core" \
            $BUNDLED_FLAG \
            $VC_BINARIES \
            --hidden-import webview \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import dotenv \
            --hidden-import core.paths \
            --hidden-import core.utils \
            --hidden-import core.platform_utils \
            --hidden-import core.executor \
            --hidden-import core.github_fetcher \
            --hidden-import core.claude_analyzer \
            --hidden-import core.launcher_gen \
            --hidden-import core.webui_gen \
            --hidden-import core.project_manager \
            --hidden-import core.version \
            $EXTRA_IMPORTS \
            app.py

      # ─── Stage Executable ───

      - name: Stage executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p staging
          mv dist/GitInstaller "staging/${{ matrix.artifact }}"
          cd staging
          zip -q -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"

      - name: Stage executable (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p staging
          if [ -d "dist/GitInstaller.app" ]; then
              mv dist/GitInstaller.app "staging/${{ matrix.artifact }}.app"
              cd staging
              zip -q -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}.app"
          else
              mv dist/GitInstaller "staging/${{ matrix.artifact }}"
              cd staging
              zip -q -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"
          fi

      - name: Stage executable (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p staging
          mv dist/GitInstaller "staging/${{ matrix.artifact }}"
          cd staging
          tar -czf "${{ matrix.artifact }}.tar.gz" "${{ matrix.artifact }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: staging/*.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout (full history for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate changelog
        id: changelog
        run: |
          # Generate changelog for the latest tag only
          git cliff --latest --strip header > RELEASE_CHANGELOG.md
          echo "Generated changelog:"
          cat RELEASE_CHANGELOG.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_CHANGELOG.md
          files: artifacts/**/*
