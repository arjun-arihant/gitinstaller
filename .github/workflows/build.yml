name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: GitInstaller-Windows
          - os: ubuntu-22.04
            artifact: GitInstaller-Linux
          - os: macos-latest
            artifact: GitInstaller-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── Platform-specific system deps ───

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            gir1.2-webkit2-4.1 \
            libwebkit2gtk-4.1-dev \
            pkg-config \
            python3-gi \
            python3-gi-cairo \
            gobject-introspection \
            libcairo2-dev

      # ─── Python deps ───

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller

      - name: Install app dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install -r requirements.txt

      - name: Install app dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install pywebview requests python-dotenv Pillow
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit
          # pystray on macOS needs AppKit
          pip install pystray

      - name: Install app dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install pywebview requests python-dotenv Pillow pystray
          pip install PyGObject

      # ─── Build ───

      - name: Build with PyInstaller (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --name GitInstaller `
            --onefile `
            --windowed `
            --icon frontend/icon.ico `
            --add-data "frontend;frontend" `
            --add-data "data;data" `
            --add-data "core;core" `
            --hidden-import webview `
            --hidden-import clr `
            --hidden-import pystray `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import dotenv `
            --hidden-import core.platform_utils `
            --hidden-import core.executor `
            --hidden-import core.github_fetcher `
            --hidden-import core.claude_analyzer `
            --hidden-import core.launcher_gen `
            --hidden-import core.webui_gen `
            --hidden-import core.project_manager `
            app.py

      - name: Build with PyInstaller (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller \
            --name GitInstaller \
            --onefile \
            --windowed \
            --add-data "frontend:frontend" \
            --add-data "data:data" \
            --add-data "core:core" \
            --hidden-import webview \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import dotenv \
            --hidden-import objc \
            --hidden-import AppKit \
            --hidden-import WebKit \
            --hidden-import Foundation \
            --hidden-import core.platform_utils \
            --hidden-import core.executor \
            --hidden-import core.github_fetcher \
            --hidden-import core.claude_analyzer \
            --hidden-import core.launcher_gen \
            --hidden-import core.webui_gen \
            --hidden-import core.project_manager \
            app.py

      - name: Build with PyInstaller (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller \
            --name GitInstaller \
            --onefile \
            --windowed \
            --add-data "frontend:frontend" \
            --add-data "data:data" \
            --add-data "core:core" \
            --hidden-import webview \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import dotenv \
            --hidden-import gi \
            --hidden-import core.platform_utils \
            --hidden-import core.executor \
            --hidden-import core.github_fetcher \
            --hidden-import core.claude_analyzer \
            --hidden-import core.launcher_gen \
            --hidden-import core.webui_gen \
            --hidden-import core.project_manager \
            app.py

      # ─── Package ───

      - name: Create bundled directory stubs
        shell: bash
        run: |
          mkdir -p staging/bundled/python
          mkdir -p staging/bundled/git
          mkdir -p staging/bundled/node
          touch staging/bundled/python/.gitkeep
          touch staging/bundled/git/.gitkeep
          touch staging/bundled/node/.gitkeep

      - name: Stage executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp dist/GitInstaller.exe staging/

      - name: Stage executable (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp dist/GitInstaller staging/
          chmod +x staging/GitInstaller

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd staging
          tar -czf "../${{ matrix.artifact }}.tar.gz" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
