name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: GitInstaller-Windows
          - os: ubuntu-22.04
            artifact: GitInstaller-Linux
          - os: macos-latest
            artifact: GitInstaller-macOS

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ─── Platform-specific system deps ───

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgirepository1.0-dev \
            gir1.2-webkit2-4.1 \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config \
            python3-gi \
            python3-gi-cairo \
            gobject-introspection \
            libcairo2-dev

      # ─── Python deps ───

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install pyinstaller

      - name: Install app dependencies (Windows)
        if: runner.os == 'Windows'
        run: pip install -r requirements.txt

      - name: Install app dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pip install pywebview requests python-dotenv Pillow pystray
          pip install pyobjc-core pyobjc-framework-Cocoa pyobjc-framework-WebKit

      - name: Install app dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          pip install pywebview requests python-dotenv Pillow pystray
          pip install PyGObject

      # ─── Prepare data directory ───

      - name: Ensure data directory exists
        shell: bash
        run: |
          mkdir -p data
          # design.md should be in the repo, but create fallback if missing
          if [ ! -f data/design.md ]; then
            echo "# GitInstaller WebUI Design" > data/design.md
            echo "No design spec configured." >> data/design.md
          fi

      # ─── Build ───

      - name: Build with PyInstaller
        shell: bash
        run: |
          SEP=":"
          ICON_FLAG=""
          EXTRA_IMPORTS=""

          if [ "$RUNNER_OS" = "Windows" ]; then
            SEP=";"
            ICON_FLAG="--icon frontend/icon.ico"
            EXTRA_IMPORTS="--hidden-import clr"
          fi

          if [ "$RUNNER_OS" = "macOS" ]; then
            EXTRA_IMPORTS="--hidden-import objc --hidden-import AppKit --hidden-import WebKit --hidden-import Foundation"
          fi

          if [ "$RUNNER_OS" = "Linux" ]; then
            EXTRA_IMPORTS="--hidden-import gi"
          fi

          pyinstaller \
            --name GitInstaller \
            --onefile \
            --windowed \
            $ICON_FLAG \
            --add-data "frontend${SEP}frontend" \
            --add-data "data${SEP}data" \
            --add-data "core${SEP}core" \
            --hidden-import webview \
            --hidden-import pystray \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import dotenv \
            --hidden-import core.platform_utils \
            --hidden-import core.executor \
            --hidden-import core.github_fetcher \
            --hidden-import core.claude_analyzer \
            --hidden-import core.launcher_gen \
            --hidden-import core.webui_gen \
            --hidden-import core.project_manager \
            $EXTRA_IMPORTS \
            app.py

      # ─── Package ───

      - name: Create bundled directory stubs
        shell: bash
        run: |
          mkdir -p staging/bundled/python
          mkdir -p staging/bundled/git
          mkdir -p staging/bundled/node
          touch staging/bundled/python/.gitkeep
          touch staging/bundled/git/.gitkeep
          touch staging/bundled/node/.gitkeep

      - name: Stage executable (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: cp dist/GitInstaller.exe staging/

      - name: Stage executable (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cp dist/GitInstaller staging/
          chmod +x staging/GitInstaller

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          cd staging
          tar -czf "../${{ matrix.artifact }}.tar.gz" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.tar.gz
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.zip
            artifacts/**/*.tar.gz
